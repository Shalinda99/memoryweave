  <rect x="505" y="352" width="120" height="44" rx="8" fill="#1e293b" stroke="#be185d" stroke-width="1"/>
  <text x="565" y="371" text-anchor="middle" fill="#f9a8d4" font-size="9" font-weight="700">Smart Forgetting</text>
  <text x="565" y="386" text-anchor="middle" fill="#78716c" font-size="9">Score = R×F×I pruning</text>

  <!-- REST API label -->
  <text x="380" y="430" text-anchor="middle" fill="#64748b" font-size="9">REST API: /chat · /memories · /metrics · /consolidate · /timeline · /benchmark · /export</text>

  <!-- Arrow: Backend → Qwen Cloud -->
  <line x1="380" y1="458" x2="380" y2="494" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2"/>
  <polygon points="375,492 385,492 380,500" fill="#475569"/>
  <text x="395" y="480" fill="#64748b" font-size="9">API calls</text>


  <rect x="135" y="352" width="120" height="44" rx="8" fill="#1e293b" stroke="#a16207" stroke-width="1"/>
  <text x="195" y="371" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">Consolidation</text>
  <text x="195" y="386" text-anchor="middle" fill="#78716c" font-size="9">Qwen-Long · nightly</text>


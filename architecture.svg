  <rect x="270" y="352" width="220" height="44" rx="8" fill="#292524" stroke="#f97316" stroke-width="1.2"/>
  <text x="380" y="371" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="700">MemoryAgent</text>
  <text x="380" y="386" text-anchor="middle" fill="#78716c" font-size="9">Qwen-Max reasoning · memory-aware prompts</text>


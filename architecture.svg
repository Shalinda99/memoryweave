  <text x="380" y="542" text-anchor="middle" fill="#78716c" font-size="9">https://dashscope-intl.aliyuncs.com/compatible-mode/v1</text>

  <rect x="120" y="552" width="118" height="38" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="179" y="568" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">qwen-max</text>
  <text x="179" y="582" text-anchor="middle" fill="#64748b" font-size="9">chat + reasoning</text>

  <rect x="250" y="552" width="118" height="38" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="309" y="568" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">qwen-long</text>
  <text x="309" y="582" text-anchor="middle" fill="#64748b" font-size="9">consolidation</text>

  <rect x="380" y="552" width="118" height="38" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="439" y="568" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">text-embedding-v3</text>
  <text x="439" y="582" text-anchor="middle" fill="#64748b" font-size="9">semantic search</text>

  <rect x="510" y="552" width="135" height="38" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="577" y="568" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">qwen-turbo</text>
  <text x="577" y="582" text-anchor="middle" fill="#64748b" font-size="9">fast scoring</text>

  <!-- Arrow: Backend → Redis -->
  <line x1="200" y1="458" x2="200" y2="618" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 2"/>
  <polygon points="195,616 205,616 200,624" fill="#7c3aed"/>

  <!-- Arrow: Backend → ChromaDB -->
  <line x1="560" y1="458" x2="560" y2="618" stroke="#059669" stroke-width="1.2" stroke-dasharray="4 2"/>
  <polygon points="555,616 565,616 560,624" fill="#059669"/>

  <!-- ── Data Stores ── -->
  <!-- Redis -->
  <rect x="100" y="628" width="160" height="56" rx="10" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="650" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">Upstash Redis</text>
  <text x="180" y="664" text-anchor="middle" fill="#64748b" font-size="9">Episodic TTL store</text>
  <text x="180" y="677" text-anchor="middle" fill="#64748b" font-size="9">Free: 10k cmds/day</text>

  <!-- ChromaDB -->
  <rect x="500" y="628" width="160" height="56" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1.5"/>
  <text x="580" y="650" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">ChromaDB</text>
  <text x="580" y="664" text-anchor="middle" fill="#64748b" font-size="9">Semantic vector store</text>
  <text x="580" y="677" text-anchor="middle" fill="#64748b" font-size="9">Embedded Python lib</text>

  <!-- ── Key Algorithms ── -->
  <rect x="100" y="710" width="560" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="380" y="731" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">KEY ALGORITHMS</text>

  <!-- Algo boxes -->
  <rect x="115" y="740" width="128" height="58" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="179" y="757" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Memory Scoring</text>
  <text x="179" y="771" text-anchor="middle" fill="#64748b" font-size="8">0.4×recency</text>
  <text x="179" y="783" text-anchor="middle" fill="#64748b" font-size="8">+0.3×freq+0.3×imp</text>
  <text x="179" y="792" text-anchor="middle" fill="#64748b" font-size="8">→ prune if &lt; 0.2</text>

  <rect x="255" y="740" width="128" height="58" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="319" y="757" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Consolidation</text>
  <text x="319" y="771" text-anchor="middle" fill="#64748b" font-size="8">10 turns → 3 facts</text>
  <text x="319" y="783" text-anchor="middle" fill="#64748b" font-size="8">contradiction detect</text>
  <text x="319" y="792" text-anchor="middle" fill="#64748b" font-size="8">via qwen-long</text>

  <rect x="395" y="740" width="128" height="58" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="459" y="757" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Context Packing</text>
  <text x="459" y="771" text-anchor="middle" fill="#64748b" font-size="8">top-K by similarity</text>
  <text x="459" y="783" text-anchor="middle" fill="#64748b" font-size="8">+ recency ranking</text>
  <text x="459" y="792" text-anchor="middle" fill="#64748b" font-size="8">fits 6k token budget</text>

  <rect x="535" y="740" width="110" height="58" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="590" y="757" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Accuracy Gain</text>
  <text x="590" y="771" text-anchor="middle" fill="#64748b" font-size="8">Baseline: 7%</text>
  <text x="590" y="783" text-anchor="middle" fill="#64748b" font-size="8">MemoryWeave: 93%</text>
  <text x="590" y="792" text-anchor="middle" fill="#64748b" font-size="8">max recall</text>

  <!-- Footer -->
  <text x="380" y="838" text-anchor="middle" fill="#334155" font-size="9">MIT License · github.com/YOUR_USERNAME/memoryweave · Track 1: MemoryAgent</text>

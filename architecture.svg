<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 860" width="760" height="860" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="760" height="860" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="380" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">MemoryWeave Architecture</text>
  <text x="380" y="62" text-anchor="middle" fill="#64748b" font-size="12">Persistent Hierarchical Memory for Qwen-Powered AI Agents</text>
  <text x="380" y="79" text-anchor="middle" fill="#64748b" font-size="11">Global AI Hackathon · Track 1: MemoryAgent · Alibaba Cloud Qwen</text>

  <!-- ── Browser / User ── -->
  <rect x="270" y="102" width="220" height="52" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="122" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">USER BROWSER</text>
  <text x="380" y="140" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700">React Dashboard (Vercel)</text>
  <text x="380" y="154" text-anchor="middle" fill="#64748b" font-size="9">Chat · Memories · Metrics · Timeline · Accuracy</text>

  <!-- Arrow: Browser → API Gateway -->
  <line x1="380" y1="154" x2="380" y2="188" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2"/>
  <polygon points="375,186 385,186 380,194" fill="#475569"/>
  <text x="395" y="175" fill="#64748b" font-size="9">HTTPS / REST</text>

  <!-- ── FastAPI Backend ── -->
  <rect x="100" y="198" width="560" height="260" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="220" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">FASTAPI BACKEND (Render.com)</text>

  <!-- Memory Orchestrator label -->
  <rect x="120" y="232" width="520" height="214" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="380" y="252" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">Memory Orchestrator</text>

  <!-- Tier 1: Working Memory -->
  <rect x="135" y="262" width="150" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="210" y="282" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="700">TIER 1</text>
  <text x="210" y="296" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="700">Working Memory</text>
  <text x="210" y="310" text-anchor="middle" fill="#64748b" font-size="9">In-context (per session)</text>
  <text x="210" y="324" text-anchor="middle" fill="#64748b" font-size="9">Token budget: 6,000</text>

  <!-- Tier 2: Episodic -->
  <rect x="305" y="262" width="150" height="70" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="380" y="282" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="700">TIER 2</text>
  <text x="380" y="296" text-anchor="middle" fill="#ede9fe" font-size="11" font-weight="700">Episodic Memory</text>
  <text x="380" y="310" text-anchor="middle" fill="#64748b" font-size="9">Upstash Redis (TTL)</text>
  <text x="380" y="324" text-anchor="middle" fill="#64748b" font-size="9">7–30 day recency window</text>

  <!-- Tier 3: Semantic -->
  <rect x="475" y="262" width="150" height="70" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1.2"/>
  <text x="550" y="282" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700">TIER 3</text>
  <text x="550" y="296" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="700">Semantic Memory</text>
  <text x="550" y="310" text-anchor="middle" fill="#64748b" font-size="9">ChromaDB (vectors)</text>
  <text x="550" y="324" text-anchor="middle" fill="#64748b" font-size="9">Qwen text-embedding-v3</text>

  <!-- Tier arrows (horizontal) -->
  <line x1="285" y1="297" x2="305" y2="297" stroke="#475569" stroke-width="1.2"/>
  <polygon points="301,293 309,297 301,301" fill="#475569"/>
  <line x1="455" y1="297" x2="475" y2="297" stroke="#475569" stroke-width="1.2"/>
  <polygon points="471,293 479,297 471,301" fill="#475569"/>

